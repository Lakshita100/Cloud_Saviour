version: "3.8"

services:
  # ── Monitored FastAPI service ──────────────────
  service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-incident-service
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - monitoring

  # ── Prometheus ─────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    depends_on:
      - service
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
